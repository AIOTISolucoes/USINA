*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{

a{text-decoration:none;color:inherit;}

#cur{
  position:fixed;width:10px;height:10px;background:var(--green);border-radius:50%;

#curR{
  position:fixed;width:34px;height:34px;border:1px solid rgba(107,211,75,.45);
  border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);

}

  body{cursor:auto;}
}

#bgC{position:fixed;inset:0;width:100%;height:100%;z-index:0;opacity:.42;}
.grid-bg{

}

  100%{top:100vh;}
}

<script>
const cur=document.getElementById('cur');
const curR=document.getElementById('curR');
let mx=0,my=0,rx=0,ry=0;

document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  cur.style.left=mx+'px';
  cur.style.top=my+'px';
});
(function ac(){
  rx+=(mx-rx)*.12;
  ry+=(my-ry)*.12;
  curR.style.left=rx+'px';
  curR.style.top=ry+'px';
  requestAnimationFrame(ac);
})();
function hoverOn(){
  cur.style.width='6px';
  cur.style.height='6px';
  curR.style.width='50px';
  curR.style.height='50px';
}
function hoverOff(){
  cur.style.width='10px';
  cur.style.height='10px';
  curR.style.width='34px';
  curR.style.height='34px';
}
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',hoverOn);
  el.addEventListener('mouseleave',hoverOff);
});

const canvas=document.getElementById('bgC');
const ctx=canvas.getContext('2d');
let W,H,pts=[];

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  buildPts();
}
function buildPts(){
  pts=[];
  const n=Math.min(Math.floor(W*H/12000),70);
  for(let i=0;i<n;i++){
    pts.push({
      x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.14,vy:-.05-Math.random()*.18,
      s:.4+Math.random()*1.3,a:.1+Math.random()*.42,c:Math.random()>.5?'107,211,75':'88,191,57',
      t:Math.random()*Math.PI*2,ts:.007+Math.random()*.011
    });
  }
}
window.addEventListener('resize',resize);
resize();

function drawBg(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<120){
        ctx.beginPath();
        ctx.moveTo(pts[i].x,pts[i].y);
        ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(95,190,70,${(1-d/120)*.07})`;
        ctx.lineWidth=.5;
        ctx.stroke();
      }
    }
  }
  pts.forEach(p=>{
    p.t+=p.ts;
    const a=p.a*(.6+.4*Math.sin(p.t));
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.c},${a})`;
    ctx.fill();
    p.x+=p.vx;
    p.y+=p.vy;
    if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
    if(p.x<-10)p.x=W+10;
    if(p.x>W+10)p.x=-10;
  });
  requestAnimationFrame(drawBg);
}
drawBg();

document.getElementById('yr').textContent=new Date().getFullYear();

const raw = sessionStorage.getItem('aioti_empresa');
const content = document.getElementById('pageContent');
const AIOTI_WHATSAPP = "5585991931240";

function escapeHtml(str=''){
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function assetPath(path=''){
  return encodeURI(path);
}

function getEmpresaData(){
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('empresa');

  if (slug && EMPRESAS_DEMO[slug]) return EMPRESAS_DEMO[slug];

  if (raw) {
    try {
      return JSON.parse(raw);
    } catch(e){}
  }

  return EMPRESAS_DEMO.conexled;
}

function openWhatsAppForProduct(empresaNome, produtoNome){
  const mensagem = `Olá! Tenho interesse no produto ${produtoNome} da empresa ${empresaNome}. Gostaria de conversar com +55 85 99193-1240 no WhatsApp.`;
  const url = `https://wa.me/${AIOTI_WHATSAPP}?text=${encodeURIComponent(mensagem)}`;
  window.open(url, '_blank');
}

const emp = getEmpresaData();

if(!emp){
  content.innerHTML=`
    <section class="not-found">
      <div class="wrap" style="position:relative;z-index:2;">
        <div class="not-found">
          <h2>Empresa não encontrada</h2>
          <p>Acesse a página de empresas e selecione um card para ver os detalhes.</p>
          <a href="produtos.html" class="nf-btn">← Ver Empresas</a>
        </div>
      </div>
    </section>`;
} else {
  document.title = `AIOTI · ${emp.nome}`;

  const produtosHTML = emp.produtos.map((p,i)=>`
    <article class="produto-card" data-empresa="${escapeHtml(emp.nome)}" data-produto="${escapeHtml(p.nome)}" role="button" tabindex="0" aria-label="Abrir WhatsApp sobre ${escapeHtml(p.nome)}">
      <div class="pc-img">
        ${
          p.img
          ? `
            <img
              src="${assetPath(p.img)}"
              alt="${escapeHtml(p.nome)}"
              loading="lazy"
              onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
            />
            <span class="pc-img-placeholder" style="display:none;">Imagem do produto</span>
          `
          : `
            <span class="pc-img-placeholder">Imagem do produto</span>
          `
        }
        <span class="pc-img-idx">${String(i+1).padStart(2,'0')}</span>
      </div>
      <div class="pc-body">
        <h3 class="pc-title">${escapeHtml(p.nome)}</h3>
        <p class="pc-desc">${escapeHtml(p.desc)}</p>
        <span class="pc-tag">${escapeHtml(p.tag)}</span>
      </div>
    </article>
  `).join('');

  content.innerHTML=`
    <section class="empresa-hero">
      <div class="wrap">
        <div class="breadcrumb">
          <a href="produtos.html">Empresas</a>
          <span>/</span>
          <span style="color:var(--green-bright)">${escapeHtml(emp.nome)}</span>
        </div>
        <div class="eh-top">
          <div class="eh-left">
            <div class="eh-initials-big">${escapeHtml(emp.initials)}</div>
            <h1 class="eh-name"><span>${escapeHtml(emp.nome)}</span></h1>
            <div class="eh-cats">
              ${emp.categorias.map(c=>`<span class="eh-cat">${escapeHtml(c.charAt(0).toUpperCase()+c.slice(1))}</span>`).join('')}
            </div>
            <p class="eh-desc">${escapeHtml(emp.desc)}</p>
          </div>
          <div class="eh-right">
            <a href="${escapeHtml(emp.url)}" target="_blank" rel="noopener" class="site-link">Visitar site oficial ↗</a>
            <div class="eh-stat">
              <div class="eh-stat-n">${emp.produtos.length}</div>
              <div class="eh-stat-l">produtos listados</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="hd"></div>

    <section class="produtos-sec">
      <div class="wrap">
        <div class="slabel">Produtos</div>
        <h2 class="sec-title">Linha <span>${escapeHtml(emp.nome)}</span></h2>
        <div class="produtos-grid">${produtosHTML}</div>
      </div>
    </section>`;

  document.querySelectorAll('.produto-card,.site-link,.nf-btn,.back-btn').forEach(el=>{
    el.addEventListener('mouseenter',hoverOn);
    el.addEventListener('mouseleave',hoverOff);
  });

  document.querySelectorAll('.produto-card').forEach(card=>{
    card.addEventListener('click',()=>{
      const empresa = card.dataset.empresa;
      const produto = card.dataset.produto;
      openWhatsAppForProduct(empresa, produto);
    });

    card.addEventListener('keydown',(e)=>{
      if(e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        const empresa = card.dataset.empresa;
        const produto = card.dataset.produto;
        openWhatsAppForProduct(empresa, produto);
      }
    });
  });
}
</script>
</body>
</html>
